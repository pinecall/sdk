<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinecall — Simple Example</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    /* ── Widget placeholder ── */
    .widget-area {
      margin-bottom: 3rem;
    }
    .widget-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6d28d9, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
    }
    .widget-placeholder:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(139, 92, 246, 0.5);
    }

    /* ── Event log ── */
    .events {
      width: 100%;
      max-width: 640px;
    }

    .events h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1rem;
    }

    .event-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .event {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      animation: slideIn 0.3s ease-out;
      border-left: 3px solid;
    }

    .event.call-started { background: rgba(34,197,94,0.08); border-color: #22c55e; }
    .event.call-ended { background: rgba(239,68,68,0.08); border-color: #ef4444; }
    .event.user-message { background: rgba(59,130,246,0.08); border-color: #3b82f6; }
    .event.bot-finished { background: rgba(168,85,247,0.08); border-color: #a855f7; }
    .event.default { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); }

    .event-type {
      font-weight: 600;
      margin-right: 0.5rem;
    }

    .event-data {
      color: rgba(255,255,255,0.5);
      word-break: break-all;
    }

    .connected-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 100px;
      font-size: 0.75rem;
      color: #22c55e;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    .empty {
      color: rgba(255,255,255,0.2);
      font-style: italic;
      text-align: center;
      padding: 2rem;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .code-preview {
      margin-top: 3rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      width: 100%;
      max-width: 640px;
    }

    .code-preview h3 {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .code-preview pre {
      font-size: 0.78rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.4);
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>@pinecall/sdk</h1>
  <p class="subtitle">Simple agent + SSE streaming</p>

  <div class="widget-area">
    <div class="widget-placeholder" title="VoiceWidget goes here">🎙</div>
  </div>

  <div class="events">
    <div id="status"></div>
    <h2>Live Events</h2>
    <div id="event-list" class="event-list">
      <div class="empty">Connecting to event stream...</div>
    </div>
  </div>

  <div class="code-preview">
    <h3>Server (3 lines)</h3>
    <pre>const mara = pc.deploy("mara", {
  prompt: "You are Mara...",
  channels: ["webrtc"],
});

app.get("/events", (req, res) => mara.stream(res));</pre>
  </div>

  <script>
    const list = document.getElementById("event-list");
    const status = document.getElementById("status");
    let first = true;

    const events = new EventSource("/events");

    events.addEventListener("connected", (e) => {
      const data = JSON.parse(e.data);
      status.innerHTML = `<div class="connected-badge"><span class="dot"></span>Connected — streaming ${data.agent}</div>`;
      if (first) { list.innerHTML = ""; first = false; }
      addEvent("connected", data, "default");
    });

    events.addEventListener("call.started", (e) => {
      addEvent("call.started", JSON.parse(e.data), "call-started");
    });

    events.addEventListener("call.ended", (e) => {
      addEvent("call.ended", JSON.parse(e.data), "call-ended");
    });

    events.addEventListener("user.message", (e) => {
      addEvent("user.message", JSON.parse(e.data), "user-message");
    });

    events.addEventListener("bot.finished", (e) => {
      addEvent("bot.finished", JSON.parse(e.data), "bot-finished");
    });

    // Catch all other events
    for (const evt of ["bot.speaking", "bot.word", "turn.end", "user.speaking"]) {
      events.addEventListener(evt, (e) => {
        addEvent(evt, JSON.parse(e.data), "default");
      });
    }

    function addEvent(type, data, cls) {
      const el = document.createElement("div");
      el.className = `event ${cls}`;

      let display = "";
      if (data.text) display = data.text;
      else if (data.from) display = `${data.from} via ${data.transport}`;
      else if (data.duration) display = `${data.duration}s — ${data.reason}`;
      else display = JSON.stringify(data);

      el.innerHTML = `<span class="event-type">${type}</span><span class="event-data">${display}</span>`;
      list.prepend(el);

      // Keep max 50 events
      while (list.children.length > 50) list.lastChild.remove();
    }
  </script>
</body>
</html>
