# pinecall test — VOICE mode (real agent-to-agent voice call)
#
# Run:  pinecall test examples/agent-tests/pines-intro.voice.spec.yaml
#       (needs PINECALL_API_KEY + the judge LLM key, e.g. ANTHROPIC_API_KEY — no ElevenLabs)
#
# The judge is a Pinecall AGENT (server-rendered voice) bridged to the target:
#   judge (Haiku brain) → call.say → server TTS (judge voice) → target hears
#   target speech → judge STT → user.message → back to the judge brain
#
# The bridged call (both voices) is played live on your speakers and recorded to
# a WAV next to here. `detectTurnEnd: true` makes the server tell the judge when
# the target finished its turn (so the judge knows when to reply).

agent: pines
description: Pines introduces itself and offers help (voice)
mode: voice

# Judge agent side (voice rendered server-side)
voice: elevenlabs/professional-male   # the judge agent's voice (Daniel — male broadcaster)
stt: flux                   # the judge agent's STT (transcribes what it hears)
detectTurnEnd: true         # server emits the target's turn.end to the judge
# greeting: "Hi!"           # uncomment to have the judge open the call;
                            # omitted → the agent greets first, judge waits.
# language: en
timeout: 45s                # voice turns are slower than text

workflow: |
  1. Greet the agent and ask what it can help you with.
  2. Verify the agent responds coherently and offers to help (no error, stays in character).
  3. Ask one simple question, e.g. "What is Pinecall?".
  4. Verify the answer is on-topic and helpful.
  5. Thank the agent and end. PASS if the conversation was coherent and helpful.
