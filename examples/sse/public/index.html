<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pinecall — SSE Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          slate: {
            25: '#fbfcfd',
            75: '#f4f6f8',
          },
          accent: {
            50: '#eff6ff',
            100: '#dbeafe',
            200: '#bfdbfe',
            300: '#93c5fd',
            400: '#60a5fa',
            500: '#3b82f6',
            600: '#2563eb',
            700: '#1d4ed8',
          },
        },
      },
    },
  };
</script>
<style>
  html, body { background: #fbfcfd; }
  body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* Pulse for active call */
  @keyframes call-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
  }
  .call-active { animation: call-pulse 2s infinite; }

  /* Slide in panel */
  @keyframes slide-up {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .slide-up { animation: slide-up 0.2s ease-out; }

  /* Chat bubble tails */
  .bubble-user {
    background: #f1f5f9;
    border-radius: 16px 16px 16px 4px;
  }
  .bubble-bot {
    background: #eff6ff;
    border: 1px solid #dbeafe;
    border-radius: 16px 16px 4px 16px;
  }
  .bubble-bot.speaking {
    border-color: #93c5fd;
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
  }

  /* Typing indicator */
  @keyframes bounce-dot {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-4px); }
  }
  .dot-1 { animation: bounce-dot 1.2s infinite 0s; }
  .dot-2 { animation: bounce-dot 1.2s infinite 0.15s; }
  .dot-3 { animation: bounce-dot 1.2s infinite 0.3s; }
</style>
</head>
<body class="min-h-screen bg-slate-25 text-slate-800">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
